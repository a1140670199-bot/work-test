<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>职场去留诊断书</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #f4f7f6; color: #333; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: #fff; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { font-size: 22px; color: #ff2442; text-align: center; }
        .question { display: none; margin-bottom: 20px; }
        .question.active { display: block; animation: fadeIn 0.5s; }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 12px; background: #fff; cursor: pointer; text-align: left; font-size: 16px; }
        .btn:hover { background: #fff5f6; border-color: #ff2442; }
        #result { display: none; text-align: center; }
        .result-title { font-size: 24px; font-weight: bold; color: #ff2442; margin-bottom: 15px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 职场去留·大数据诊断</h1>
        <div id="quiz">
            </div>
        <div id="result">
            <p>你的诊断结果是：</p>
            <div class="result-title" id="resTitle"></div>
            <p id="resDesc" style="line-height: 1.6;"></p>
            <hr>
            <p style="font-size: 14px; color: #666;">想获取 1V1 职业规划建议？<br>私信博主，发送“破局”</p>
        </div>
    </div>

    <script>
        const questions = [
            { q: "1. 每天早上睁眼想到上班，你的第一反应是？", a: "又是奋斗的一天", b: "机械起床，面无表情", c: "呼吸困难，想原地辞职" },
            { q: "2. 现在的薪资扣除房租和饭钱，你还能剩下？", a: "绰绰有余，甚至能理财", b: "勉强糊口，月光边际", c: "倒贴上班，负债前行" },
            { q: "3. 当你在工作中犯了一个小错，领导通常会？", a: "耐心指导并一起复盘", b: "阴阳怪气或冷暴力", c: "歇斯底里，全员通报" },
            { q: "4. 回头看过去三个月，你觉得自己有进步吗？", a: "技能点拉满，很有成就感", b: "熟练的搬砖工而已", c: "除了学会忍气吞声，毫无进步" },
            { q: "5. 下班回到家后，你还有精力和朋友聚会吗？", a: "依然活力四射", b: "只想躺平刷手机到深夜", c: "连话都不想说，只想哭" },
            { q: "6. 办公室里的氛围更像是？", a: "互助小组，大家很Nice", b: "莫不关心，各自为政", c: "甄嬛传现场，勾心斗角" },
            { q: "7. 你觉得自己现在的工作内容是否有意义？", a: "是在创造价值", b: "纯粹是为了那点碎银子", c: "在制造垃圾，浪费生命" },
            { q: "8. 你的加班常态是？", a: "偶尔为之，且有加班费", b: "默认潜规则，被迫表演", c: "24小时待命，精神衰弱" },
            { q: "9. 如果明天公司倒闭，你的存款能撑多久？", a: "一年以上，完全不慌", b: "3-6个月，有点压力", c: "撑不过下个月房租" },
            { q: "10. 给现在的“班味”打分，你觉得你腌入味了吗？", a: "清爽如初", b: "略带苦涩", c: "已经臭不可闻了" }
        ];

        let currentIdx = 0;
        let totalScore = 0;

        function showQuestion() {
            if(currentIdx >= questions.length) {
                showResult();
                return;
            }
            const item = questions[currentIdx];
            let html = `<div class="question active">
                <p style="font-weight:bold; margin-bottom:15px;">${item.q}</p>
                <button class="btn" onclick="next(1)">A. ${item.a}</button>
                <button class="btn" onclick="next(3)">B. ${item.b}</button>
                <button class="btn" onclick="next(5)">C. ${item.c}</button>
            </div>`;
            document.getElementById('quiz').innerHTML = html;
        }

        function next(score) {
            totalScore += score;
            currentIdx++;
            showQuestion();
        }

        function showResult() {
            document.getElementById('quiz').style.display = 'none';
            const resDiv = document.getElementById('result');
            resDiv.style.display = 'block';
            
            let title, desc;
            if(totalScore <= 22) {
                title = "稳住别浪！";
                desc = "你正处于职场安全区。虽然有点小委屈，但目前性价比最高，建议带薪摸鱼，积蓄力量。";
            } else if(totalScore <= 38) {
                title = "骑驴找马！";
                desc = "这份工作已经在透支你了。别冲动离职，偷偷改简历吧，外面的世界更精彩。";
            } else {
                title = "火速跑路！";
                desc = "这里是身心健康黑洞！再待下去是在折寿。钱可以再赚，命只有一条，立马止损！";
            }
            document.getElementById('resTitle').innerText = title;
            document.getElementById('resDesc').innerText = desc;
        }

        showQuestion();
    </script>
</body>
</html>
